<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>3D FPS - Achex Online</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial', sans-serif; background: #000; }
        #ui { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
              background: rgba(20, 20, 20, 0.9); padding: 30px; color: white; text-align: center; 
              border-radius: 15px; border: 2px solid #444; z-index: 100; }
        input, select, button { display: block; margin: 15px auto; padding: 12px; width: 220px; 
                                border-radius: 5px; border: none; font-size: 16px; }
        button { background: #28a745; color: white; cursor: pointer; font-weight: bold; }
        button:hover { background: #218838; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px;
                     border: 2px solid #0f0; border-radius: 50%; transform: translate(-50%, -50%); 
                     pointer-events: none; display: none; z-index: 50; }
        #status { position: absolute; top: 10px; left: 10px; color: #0f0; font-family: monospace; }
    </style>
</head>
<body>
    <div id="status">Connecting to Achex...</div>
    <div id="ui">
        <h2>3D FPS ONLINE</h2>
        <input type="text" id="nameInput" placeholder="プレイヤー名" value="Soldier">
        <select id="weaponSelect">
            <option value="AR">Assault Rifle</option>
            <option value="SR">Sniper Rifle</option>
            <option value="SMG">Submachine Gun</option>
        </select>
        <button id="startBtn">サーバーに接続して開始</button>
    </div>
    <div id="crosshair"></div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/PointerLockControls.js';

        let scene, camera, renderer, controls;
        let ws;
        let myId = "player_" + Math.floor(Math.random() * 10000);
        let otherPlayers = {};
        const keys = {};
        const ROOM_NAME = "fps_demo_room_999"; // 共通の部屋名

        // UIイベント
        document.getElementById('startBtn').onclick = () => {
            const name = document.getElementById('nameInput').value;
            const weapon = document.getElementById('weaponSelect').value;
            connectAchex(name, weapon);
        };

        function connectAchex(name, weapon) {
            ws = new WebSocket('wss://achex.ca:4010');

            ws.onopen = () => {
                document.getElementById('status').innerText = "Connected to Achex";
                // Achexにログイン(部屋に入る)
                ws.send(JSON.stringify({ auth: myId, password: "password123" }));
                ws.send(JSON.stringify({ join: ROOM_NAME }));

                initGame(name, weapon);
                document.getElementById('ui').style.display = 'none';
                document.getElementById('crosshair').style.display = 'block';
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                // 他のプレイヤーからの位置情報を受信
                if (data.sID && data.sID !== myId && data.msg) {
                    const m = data.msg;
                    if (m.type === 'move') {
                        updateOtherPlayer(data.sID, m);
                    }
                }
            };
        }

        function initGame(name, weapon) {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111111);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            // ランダムスポーン地点の設定
            camera.position.set((Math.random()-0.5)*40, 1.6, (Math.random()-0.5)*40);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            controls = new PointerLockControls(camera, document.body);
            document.addEventListener('click', () => controls.lock());

            // 地面と照明
            const grid = new THREE.GridHelper(100, 50, 0x444444, 0x222222);
            scene.add(grid);
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(10, 20, 10);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040));

            animate();
        }

        function updateOtherPlayer(id, data) {
            if (!otherPlayers[id]) {
                // 初めて見るプレイヤーなら作成
                const group = new THREE.Group();
                const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 1, 4, 8), new THREE.MeshStandardMaterial({color: 0xff0000}));
                body.position.y = 1;
                group.add(body);
                
                // 銃のダミー
                const gun = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.8), new THREE.MeshStandardMaterial({color: 0x555555}));
                gun.position.set(0.3, 1.2, -0.4);
                group.add(gun);

                scene.add(group);
                otherPlayers[id] = group;
            }
            // 位置と回転を更新
            otherPlayers[id].position.set(data.x, data.y - 0.6, data.z);
            otherPlayers[id].rotation.y = data.ry;
        }

        window.onkeydown = (e) => keys[e.code] = true;
        window.onkeyup = (e) => keys[e.code] = false;

        function animate() {
            requestAnimationFrame(animate);
            if (controls && controls.isLocked) {
                const speed = 0.15;
                if (keys['KeyW']) controls.moveForward(speed);
                if (keys['KeyS']) controls.moveForward(-speed);
                if (keys['KeyA']) controls.moveRight(-speed);
                if (keys['KeyD']) controls.moveRight(speed);

                // Achex経由で自分の位置を送信
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({
                        to: "all",
                        room: ROOM_NAME,
                        msg: {
                            type: 'move',
                            x: camera.position.x,
                            y: camera.position.y,
                            z: camera.position.z,
                            ry: camera.rotation.y
                        }
                    }));
                }
            }
            if (renderer) renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            if (camera) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>
</html>
