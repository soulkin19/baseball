<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>プロスピ風 野球ミニゲーム</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e74c3c;
            --bg: #ecf0f1;
            --strike-zone: rgba(255, 255, 255, 0.3);
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
        }
        #game-container {
            position: relative;
            margin-top: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border-radius: 8px;
            overflow: hidden;
            background-color: #27ae60; /* 芝生の色 */
        }
        canvas {
            display: block;
            cursor: crosshair;
        }
        /* UIパネル */
        #ui-layer {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }
        .scoreboard {
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            font-weight: bold;
            pointer-events: auto;
        }
        .controls {
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 8px;
            pointer-events: auto;
            text-align: center;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.1);
        }
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 10px;
        }
        button {
            padding: 10px 15px;
            border: 2px solid var(--primary);
            background: white;
            color: var(--primary);
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button.active, button:active {
            background: var(--primary);
            color: white;
        }
        button.btn-accent {
            border-color: var(--accent);
            color: var(--accent);
        }
        button.btn-accent.active {
            background: var(--accent);
            color: white;
        }
        /* メッセージ表示 */
        #message-overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    
    <div id="ui-layer">
        <div class="scoreboard">
            <span id="inning-text">1回表</span>
            <span>P1: <span id="score-p1">0</span> | P2: <span id="score-p2">0</span></span>
            <span id="out-text">0 OUT</span>
        </div>

        <!-- ピッチャー用UI -->
        <div id="pitcher-ui" class="controls">
            <h3>【ピッチャー】球種を選択し、ストライクゾーンをクリックして投球！</h3>
            <div class="btn-group">
                <button class="pitch-btn active" data-type="ストレート">ストレート</button>
                <button class="pitch-btn" data-type="イーファス">イーファス</button>
                <button class="pitch-btn" data-type="スプリット">スプリット</button>
                <button class="pitch-btn" data-type="ツーシーム">ツーシーム</button>
                <button class="pitch-btn" data-type="スライダー">スライダー</button>
                <button class="pitch-btn" data-type="高速スライダー">高速スライダー</button>
            </div>
        </div>

        <!-- バッター交代・待機UI -->
        <div id="transition-ui" class="controls hidden">
            <h3>バッターに画面を交代してください</h3>
            <button id="btn-ready-batter" class="active">バッター準備完了</button>
        </div>

        <!-- バッター用UI -->
        <div id="batter-ui" class="controls hidden">
            <h3>【バッター】打ち方を選択し、画面クリックでスイング！</h3>
            <div class="btn-group">
                <button class="swing-btn active btn-accent" data-type="ミート">ミート打（当てやすい）</button>
                <button class="swing-btn btn-accent" data-type="強振">強振（ホームラン狙い）</button>
            </div>
        </div>
    </div>
    
    <div id="message-overlay">PLAY BALL</div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // --- ゲーム設定と状態 ---
    const GAME_CONFIG = {
        strikeZone: { x: 300, y: 150, w: 200, h: 250 },
        moundY: 50,
        maxInnings: 2,
    };

    const state = {
        phase: 'PITCHER_SELECT', // PITCHER_SELECT, TRANSITION, BATTER_READY, PITCHING, RESULT, GAME_OVER
        inning: 1,
        isTop: true, // true: 表(P1攻撃), false: 裏(P2攻撃)
        outs: 0,
        scores: { p1: 0, p2: 0 },
        
        // 投球データ
        pitchType: 'ストレート',
        targetX: 400,
        targetY: 300,
        ball: { x: 400, y: 50, size: 2, progress: 0 },
        pitchSpeed: 0,
        
        // 打撃データ
        swingType: 'ミート',
        cursor: { x: 400, y: 300 },
        hasSwung: false
    };

    // --- 球種データ ---
    const PITCH_TYPES = {
        'ストレート': { speed: 0.02, getMod: (t) => ({ x: 0, y: 0 }) },
        'イーファス': { speed: 0.008, getMod: (t) => ({ x: 0, y: -Math.sin(t * Math.PI) * 200 }) }, // 上に大きく上がる
        'スプリット': { speed: 0.018, getMod: (t) => ({ x: 0, y: t > 0.8 ? (t - 0.8) * 400 : 0 }) }, // 最後に鋭く落ちる
        'ツーシーム': { speed: 0.019, getMod: (t) => ({ x: t > 0.6 ? (t - 0.6) * 150 : 0, y: t > 0.6 ? (t - 0.6) * 100 : 0 }) }, // 右下にシュート回転
        'スライダー': { speed: 0.015, getMod: (t) => ({ x: Math.pow(t, 2) * -200, y: Math.pow(t, 2) * 50 }) }, // 左に大きく曲がる
        '高速スライダー': { speed: 0.019, getMod: (t) => ({ x: Math.pow(t, 2) * -100, y: 0 }) } // 左に鋭く曲がる
    };

    // --- UI制御 ---
    const dom = {
        pitcherUI: document.getElementById('pitcher-ui'),
        transitionUI: document.getElementById('transition-ui'),
        batterUI: document.getElementById('batter-ui'),
        msgOverlay: document.getElementById('message-overlay'),
        pitchBtns: document.querySelectorAll('.pitch-btn'),
        swingBtns: document.querySelectorAll('.swing-btn')
    };

    function updateUI() {
        document.getElementById('inning-text').innerText = `${state.inning}回${state.isTop ? '表' : '裏'}`;
        document.getElementById('score-p1').innerText = state.scores.p1;
        document.getElementById('score-p2').innerText = state.scores.p2;
        document.getElementById('out-text').innerText = `${state.outs} OUT`;

        dom.pitcherUI.classList.toggle('hidden', state.phase !== 'PITCHER_SELECT');
        dom.transitionUI.classList.toggle('hidden', state.phase !== 'TRANSITION');
        dom.batterUI.classList.toggle('hidden', state.phase !== 'BATTER_READY' && state.phase !== 'PITCHING');
    }

    function showMessage(text, duration = 1500) {
        dom.msgOverlay.innerText = text;
        dom.msgOverlay.style.opacity = 1;
        setTimeout(() => dom.msgOverlay.style.opacity = 0, duration);
    }

    // --- 入力イベント ---
    dom.pitchBtns.forEach(btn => {
        btn.onclick = (e) => {
            dom.pitchBtns.forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            state.pitchType = e.target.dataset.type;
        };
    });

    dom.swingBtns.forEach(btn => {
        btn.onclick = (e) => {
            dom.swingBtns.forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            state.swingType = e.target.dataset.type;
        };
    });

    document.getElementById('btn-ready-batter').onclick = () => {
        state.phase = 'BATTER_READY';
        updateUI();
        setTimeout(startPitch, 1000); // 1秒後に投球開始
    };

    canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        state.cursor.x = e.clientX - rect.left;
        state.cursor.y = e.clientY - rect.top;
    });

    canvas.addEventListener('mousedown', (e) => {
        if (state.phase === 'PITCHER_SELECT') {
            // コース決定して投球準備へ
            state.targetX = state.cursor.x;
            state.targetY = state.cursor.y;
            state.phase = 'TRANSITION';
            updateUI();
        } else if (state.phase === 'PITCHING' && !state.hasSwung) {
            // スイング実行
            executeSwing();
        }
    });

    // --- ゲームロジック ---
    function startPitch() {
        state.phase = 'PITCHING';
        state.ball.progress = 0;
        state.hasSwung = false;
        state.pitchSpeed = PITCH_TYPES[state.pitchType].speed;
        updateUI();
        requestAnimationFrame(gameLoop);
    }

    function executeSwing() {
        state.hasSwung = true;
        const t = state.ball.progress;
        
        // タイミング判定 (1.0がホームベース到達時)
        if (t < 0.7 || t > 1.2) {
            processResult("空振り", 0);
            return;
        }

        // 距離判定
        const dist = Math.hypot(state.ball.x - state.cursor.x, state.ball.y - state.cursor.y);
        const hitRadius = state.swingType === 'ミート' ? 35 : 15; // 強振は芯が狭い

        if (dist < hitRadius + state.ball.size) {
            // ヒット判定
            const timingDiff = Math.abs(1.0 - t);
            if (timingDiff < 0.05 && state.swingType === '強振' && dist < 10) {
                processResult("ホームラン!!", 1);
            } else if (timingDiff < 0.15) {
                processResult("ヒット!", 0.5); // 得点確率などを設定可能（今回は簡易的に確実に点を入れるかランダムか）
            } else {
                processResult("ファウル", 0); // 今回のルールでは1球勝負なのでアウト扱いにするかファウルにするか
            }
        } else {
            processResult("空振り", 0);
        }
    }

    function processResult(resultText, scoreAdd) {
        state.phase = 'RESULT';
        showMessage(resultText, 2000);
        
        if (scoreAdd > 0) {
            const attacker = state.isTop ? 'p1' : 'p2';
            state.scores[attacker] += scoreAdd;
        } else {
            state.outs += 1;
        }

        setTimeout(nextTurn, 2000);
    }

    function nextTurn() {
        // アウトカウント（1アウトで攻守交代の超短期決戦ルール）
        if (state.outs >= 1) {
            state.outs = 0;
            if (state.isTop) {
                state.isTop = false; // 裏へ
            } else {
                state.inning += 1; // 次の回へ
                state.isTop = true;
            }
        }

        if (state.inning > GAME_CONFIG.maxInnings) {
            state.phase = 'GAME_OVER';
            updateUI();
            const winner = state.scores.p1 > state.scores.p2 ? "P1の勝利！" : 
                           state.scores.p1 < state.scores.p2 ? "P2の勝利！" : "引き分け！";
            showMessage(`試合終了！ ${winner}`, 10000);
            return;
        }

        state.phase = 'PITCHER_SELECT';
        state.hasSwung = false;
        updateUI();
        drawCanvas();
    }

    // --- 描画ロジック ---
    function drawCanvas() {
        // 背景クリア
        ctx.fillStyle = '#27ae60';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // ストライクゾーン
        const sz = GAME_CONFIG.strikeZone;
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 3;
        ctx.strokeRect(sz.x, sz.y, sz.w, sz.h);
        
        // ゾーンの分割線
        ctx.beginPath();
        ctx.moveTo(sz.x + sz.w/3, sz.y); ctx.lineTo(sz.x + sz.w/3, sz.y + sz.h);
        ctx.moveTo(sz.x + sz.w*2/3, sz.y); ctx.lineTo(sz.x + sz.w*2/3, sz.y + sz.h);
        ctx.moveTo(sz.x, sz.y + sz.h/3); ctx.lineTo(sz.x + sz.w, sz.y + sz.h/3);
        ctx.moveTo(sz.x, sz.y + sz.h*2/3); ctx.lineTo(sz.x + sz.w, sz.y + sz.h*2/3);
        ctx.stroke();

        // 状態ごとの描画
        if (state.phase === 'PITCHER_SELECT') {
            // ピッチャーのカーソル（投球目標）
            ctx.fillStyle = 'rgba(231, 76, 60, 0.5)';
            ctx.beginPath();
            ctx.arc(state.cursor.x, state.cursor.y, 10, 0, Math.PI * 2);
            ctx.fill();
        } 
        else if (state.phase === 'BATTER_READY' || state.phase === 'PITCHING' || state.phase === 'RESULT') {
            // バッターのカーソル
            ctx.strokeStyle = state.swingType === '強振' ? '#e74c3c' : '#3498db';
            ctx.lineWidth = 4;
            const radius = state.swingType === '強振' ? 15 : 35;
            ctx.beginPath();
            ctx.arc(state.cursor.x, state.cursor.y, radius, 0, Math.PI * 2);
            ctx.stroke();
            
            // ボールの描画
            if (state.phase === 'PITCHING') {
                ctx.fillStyle = 'white';
                ctx.strokeStyle = '#c0392b';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(state.ball.x, state.ball.y, state.ball.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
            }
        }
    }

    function gameLoop() {
        if (state.phase !== 'PITCHING') return;

        // ボールの進行
        state.ball.progress += state.pitchSpeed;
        const t = state.ball.progress;

        // ベースの直線軌道計算（マウンド中央上部 から ターゲットへ）
        const startX = canvas.width / 2;
        const startY = GAME_CONFIG.moundY;
        let bx = startX + (state.targetX - startX) * t;
        let by = startY + (state.targetY - startY) * t;

        // 球種による変化を加算
        const mod = PITCH_TYPES[state.pitchType].getMod(t);
        bx += mod.x;
        by += mod.y;

        state.ball.x = bx;
        state.ball.y = by;
        
        // 遠近感（近づくほど大きくなる）
        state.ball.size = 2 + (t * 25);

        drawCanvas();

        // キャッチャーミット到達（見逃し判定）
        if (t > 1.1 && !state.hasSwung) {
            // ストライクゾーン内かどうかの判定
            const sz = GAME_CONFIG.strikeZone;
            if (bx > sz.x && bx < sz.x + sz.w && by > sz.y && by < sz.y + sz.h) {
                processResult("見逃しストライク", 0);
            } else {
                // 今回はシンプルにボール球は見逃せばノーカン（やり直し）にします
                showMessage("ボール！", 1500);
                setTimeout(() => {
                    state.phase = 'PITCHER_SELECT';
                    updateUI();
                    drawCanvas();
                }, 1500);
                return;
            }
            return; // ループ終了
        }

        requestAnimationFrame(gameLoop);
    }

    // 初期化描画
    updateUI();
    drawCanvas();

</script>
</body>
</html>
