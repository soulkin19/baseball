<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>プロスピ風 ブラウザ野球</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 10px;
            /* タッチデバイスでのデフォルトスワイプ動作を無効化 */
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }
        #scoreboard {
            width: 100%;
            max-width: 600px;
            background: linear-gradient(to bottom, #333, #000);
            border: 2px solid #555;
            border-radius: 8px;
            padding: 10px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .team-score { display: flex; flex-direction: column; align-items: center; width: 25%; font-weight: bold;}
        .inning-info { display: flex; flex-direction: column; align-items: center; width: 50%; color: #ffd700; font-weight: bold;}
        .count-board { display: flex; gap: 10px; margin-top: 5px;}
        .indicator { width: 12px; height: 12px; border-radius: 50%; border: 1px solid #777; background-color: #222; display: inline-block; margin-right: 2px;}
        .strike.active { background-color: #ffeb3b; } /* プロスピ風の黄色 */
        .ball.active { background-color: #4caf50; }  /* プロスピ風の緑 */
        .out.active { background-color: #f44336; }   /* 赤 */
        
        #game-container {
            position: relative;
            width: 100%;
            max-width: 600px;
        }
        canvas {
            width: 100%;
            height: auto;
            background-color: #2e7d32; /* 球場の芝生の色 */
            border: 2px solid #fff;
            border-radius: 8px;
            display: block;
        }
        #message {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 10vw; /* 画面サイズに合わせる */
            font-weight: bold;
            color: #fff;
            text-shadow: 3px 3px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            white-space: nowrap;
        }
        
        /* モバイル/iPad用コントローラー */
        #controls {
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            height: 80px;
        }
        .instruction {
            width: 60%;
            font-size: 14px;
            color: #ccc;
            display: flex;
            align-items: center;
        }
        #swing-btn {
            width: 35%;
            background: linear-gradient(to bottom, #ff5722, #bf360c);
            color: white;
            border: 2px solid #fff;
            border-radius: 40px;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            cursor: pointer;
            transition: transform 0.1s;
        }
        #swing-btn:active {
            transform: scale(0.95);
        }
        #swing-btn:disabled {
            background: #555;
            color: #888;
            border-color: #777;
        }

        @media (min-width: 600px) {
            #message { font-size: 60px; }
        }
    </style>
</head>
<body>

    <div id="scoreboard">
        <div class="team-score">
            <div>YOU</div>
            <div id="score-player" style="font-size: 28px;">0</div>
        </div>
        <div class="inning-info">
            <div id="inning-text">1回 表 (あなたの攻撃)</div>
            <div class="count-board">
                <div>B <span id="ball-1" class="indicator ball"></span><span id="ball-2" class="indicator ball"></span><span id="ball-3" class="indicator ball"></span></div>
                <div>S <span id="strike-1" class="indicator strike"></span><span id="strike-2" class="indicator strike"></span></div>
                <div>O <span id="out-1" class="indicator out"></span><span id="out-2" class="indicator out"></span></div>
            </div>
        </div>
        <div class="team-score">
            <div>BOT</div>
            <div id="score-bot" style="font-size: 28px;">0</div>
        </div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas" width="600" height="600"></canvas>
        <div id="message">PLAY BALL!</div>
    </div>

    <div id="controls">
        <div class="instruction" id="instruction-text">
            【攻撃】画面をドラッグしてカーソルを移動。右のボタンでスイング！
        </div>
        <button id="swing-btn">スイング</button>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// ゲームステート
let state = {
    inning: 1, isTop: true, playerScore: 0, botScore: 0,
    balls: 0, strikes: 0, outs: 0, bases: [false, false, false],
    phase: 'ready', messageTimer: 0, maxInnings: 3
};

// 3D/擬似奥行き用の定数 (キャッチャー視点)
const MOUND = { x: 300, y: 250, size: 5 }; // ピッチャーの位置（奥）
const STRIKE_ZONE = { x: 200, y: 300, w: 200, h: 200 }; // ストライクゾーン（手前）
const BALL_MIN_SIZE = 3;  // 奥にあるときのボールサイズ
const BALL_MAX_SIZE = 15; // 手前に来たときのボールサイズ

// オブジェクト
let ball = { x: MOUND.x, y: MOUND.y, z: 0, targetX: 300, targetY: 400, active: false, speed: 0.03, progress: 0 };
let cursor = { x: 300, y: 400, radius: 25, isDragging: false }; // ミートカーソル
let swingAnim = 0; // スイング時のエフェクト用

function showMessage(text, duration = 60) {
    const msgEl = document.getElementById('message');
    msgEl.innerText = text;
    msgEl.style.opacity = 1;
    state.messageTimer = duration;
}

function updateUI() {
    document.getElementById('score-player').innerText = state.playerScore;
    document.getElementById('score-bot').innerText = state.botScore;
    document.getElementById('inning-text').innerText = `${state.inning}回 ${state.isTop ? '表 (あなた攻撃)' : '裏 (ボット攻撃)'}`;
    
    for(let i=1; i<=3; i++) document.getElementById(`ball-${i}`).classList.toggle('active', state.balls >= i);
    for(let i=1; i<=2; i++) document.getElementById(`strike-${i}`).classList.toggle('active', state.strikes >= i);
    for(let i=1; i<=2; i++) document.getElementById(`out-${i}`).classList.toggle('active', state.outs >= i);

    document.getElementById('instruction-text').innerHTML = state.isTop 
        ? "【攻撃】画面をドラッグしてカーソル移動。<br>タイミングよくスイング！" 
        : "【守備】ストライクゾーン付近をタップして<br>投球コースを決定！";
        
    document.getElementById('swing-btn').disabled = !state.isTop;

    if(state.messageTimer > 0) {
        state.messageTimer--;
        if(state.messageTimer <= 0) document.getElementById('message').style.opacity = 0;
    }
}

function resetCount() { state.balls = 0; state.strikes = 0; }
function addStrike() {
    state.strikes++;
    if(state.strikes >= 3) { showMessage("STRIKEOUT!", 80); addOut(); resetCount(); }
    else showMessage("STRIKE!");
}
function addBall() {
    state.balls++;
    if(state.balls >= 4) { showMessage("WALK (四球)!", 80); advanceRunners(1); resetCount(); }
    else showMessage("BALL!");
}
function addOut() {
    state.outs++;
    if(state.outs >= 3) switchInning();
}

function advanceRunners(basesToAdvance) {
    let runs = 0;
    if(basesToAdvance === 1 && !state.bases[0]) { state.bases[0] = true; return; }
    for (let i = 2; i >= 0; i--) {
        if (state.bases[i]) {
            state.bases[i] = false;
            if (i + basesToAdvance >= 3) runs++;
            else state.bases[i + basesToAdvance] = true;
        }
    }
    if (basesToAdvance >= 4) runs++;
    else if (basesToAdvance > 0) state.bases[basesToAdvance - 1] = true;

    if(runs > 0) {
        if(state.isTop) state.playerScore += runs; else state.botScore += runs;
        showMessage(`${runs} RUNS SCORE!`, 90);
    }
}

function switchInning() {
    state.outs = 0; resetCount(); state.bases = [false, false, false];
    if(state.isTop) { state.isTop = false; showMessage("CHANGE!", 100); } 
    else {
        state.inning++;
        if(state.inning > state.maxInnings) {
            let res = state.playerScore > state.botScore ? "YOU WIN!" : (state.playerScore < state.botScore ? "YOU LOSE..." : "DRAW");
            showMessage(`GAME OVER\n${res}`, 9999);
            state.phase = 'gameover';
            return;
        }
        state.isTop = true; showMessage("CHANGE!", 100);
    }
}

// 投球開始
function throwPitch(tx, ty) {
    if(state.phase !== 'ready') return;
    ball.targetX = tx; ball.targetY = ty;
    ball.progress = 0;
    ball.active = true;
    state.phase = 'pitching';
    ball.speed = 0.015 + Math.random() * 0.01; // 球速のブレ
}

// スイング処理
function swing() {
    if(!state.isTop || state.phase !== 'pitching' || swingAnim > 0) return;
    swingAnim = 15; // スイングエフェクトのフレーム数
    
    // プロスピ風判定：ボールが手前(progressが0.85〜1.0)に来た時にスイングしたか
    if (ball.progress > 0.85 && ball.progress <= 1.05) {
        // カーソルとボールの距離を計算
        let dx = ball.x - cursor.x;
        let dy = ball.y - cursor.y;
        let distance = Math.sqrt(dx*dx + dy*dy);
        
        if (distance < cursor.radius) {
            hitBall(distance);
            return;
        }
    }
    // タイミングがずれている、またはカーソルが合っていない
    if (ball.progress > 0.5 && ball.progress < 1.2) {
        state.phase = 'dead';
        addStrike();
    }
}

function hitBall(distance) {
    state.phase = 'hit';
    ball.active = false; // 打ったのでボールを消す
    let timing = Math.abs(ball.progress - 0.95); // 0.95がジャストタイミングとする
    let power = Math.random();

    // 芯で捉え、かつタイミングが良い
    if (distance < 10 && timing < 0.03 && power > 0.6) {
        showMessage("HOME RUN!!!", 120); advanceRunners(4);
    } else if (distance < 20 && timing < 0.06) {
        showMessage("HIT!", 80); advanceRunners(1);
    } else if (power > 0.3) {
        showMessage("OUT...", 80); addOut();
    } else {
        showMessage("FOUL", 60);
        if(state.strikes < 2) state.strikes++;
    }
    if(state.phase === 'hit') resetCount();
}

function update() {
    if(state.phase === 'gameover') return;

    if(state.phase === 'pitching') {
        ball.progress += ball.speed;
        
        // 奥行きの計算 (0:奥 -> 1:手前)
        // 変化球ロジック (ボット投球時、少し曲がる)
        let curveX = 0;
        if(state.isTop) curveX = Math.sin(ball.progress * Math.PI) * 20 * (Math.random() > 0.5 ? 1 : -1);

        ball.x = MOUND.x + (ball.targetX - MOUND.x + curveX) * ball.progress;
        ball.y = MOUND.y + (ball.targetY - MOUND.y) * ball.progress;
        
        // キャッチャーミットに到達 (progress >= 1)
        if(ball.progress >= 1.05) {
            state.phase = 'dead';
            let isStrike = (ball.targetX >= STRIKE_ZONE.x && ball.targetX <= STRIKE_ZONE.x + STRIKE_ZONE.w &&
                            ball.targetY >= STRIKE_ZONE.y && ball.targetY <= STRIKE_ZONE.y + STRIKE_ZONE.h);
            if(isStrike) addStrike(); else addBall();
        }

        // ボットの自動スイング（守備時）
        if(!state.isTop && ball.progress > 0.9 && ball.progress < 0.95) {
            let isStrike = (ball.targetX >= STRIKE_ZONE.x && ball.targetX <= STRIKE_ZONE.x + STRIKE_ZONE.w &&
                            ball.targetY >= STRIKE_ZONE.y && ball.targetY <= STRIKE_ZONE.y + STRIKE_ZONE.h);
            if(isStrike || Math.random() < 0.2) {
                // ボットは一定の確率でカーソルを合わせてくる
                cursor.x = ball.targetX + (Math.random() - 0.5) * 30;
                cursor.y = ball.targetY + (Math.random() - 0.5) * 30;
                swingAnim = 15;
                let dx = ball.x - cursor.x; let dy = ball.y - cursor.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if(dist < cursor.radius) hitBall(dist);
                else { state.phase = 'dead'; addStrike(); }
            }
        }
    }

    if(swingAnim > 0) swingAnim--;

    // ボットの投球開始（プレイヤー攻撃時）
    if(state.isTop && state.phase === 'ready' && Math.random() < 0.02) {
        // ストライクゾーン付近にランダムに目標を定める
        let tx = STRIKE_ZONE.x - 20 + Math.random() * (STRIKE_ZONE.w + 40);
        let ty = STRIKE_ZONE.y - 20 + Math.random() * (STRIKE_ZONE.h + 40);
        throwPitch(tx, ty);
    }

    // 次の球への移行
    if(state.phase === 'dead' || state.phase === 'hit') {
        setTimeout(() => {
            if(state.phase !== 'gameover') { ball.active = false; state.phase = 'ready'; }
        }, 1500);
        state.phase = 'waiting';
    }

    updateUI();
}

function draw() {
    // 背景（球場後方）
    ctx.fillStyle = '#1b5e20'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // マウンド（奥）
    ctx.fillStyle = '#8d6e63';
    ctx.beginPath(); ctx.ellipse(MOUND.x, MOUND.y, 60, 20, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.fillRect(MOUND.x - 10, MOUND.y - 2, 20, 4); // ピッチャープレート

    // ピッチャー（シルエット）
    ctx.fillStyle = '#333';
    ctx.beginPath(); ctx.arc(MOUND.x, MOUND.y - 30, 15, 0, Math.PI*2); ctx.fill();
    ctx.fillRect(MOUND.x - 15, MOUND.y - 20, 30, 40);

    // ホームベース（手前）
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.moveTo(300, 560); ctx.lineTo(340, 560); ctx.lineTo(340, 580); ctx.lineTo(300, 595); ctx.lineTo(260, 580); ctx.lineTo(260, 560);
    ctx.closePath(); ctx.fill();

    // ストライクゾーン枠（9分割）
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)'; ctx.lineWidth = 2;
    ctx.strokeRect(STRIKE_ZONE.x, STRIKE_ZONE.y, STRIKE_ZONE.w, STRIKE_ZONE.h);
    ctx.beginPath();
    // 縦線
    ctx.moveTo(STRIKE_ZONE.x + STRIKE_ZONE.w/3, STRIKE_ZONE.y); ctx.lineTo(STRIKE_ZONE.x + STRIKE_ZONE.w/3, STRIKE_ZONE.y + STRIKE_ZONE.h);
    ctx.moveTo(STRIKE_ZONE.x + STRIKE_ZONE.w*2/3, STRIKE_ZONE.y); ctx.lineTo(STRIKE_ZONE.x + STRIKE_ZONE.w*2/3, STRIKE_ZONE.y + STRIKE_ZONE.h);
    // 横線
    ctx.moveTo(STRIKE_ZONE.x, STRIKE_ZONE.y + STRIKE_ZONE.h/3); ctx.lineTo(STRIKE_ZONE.x + STRIKE_ZONE.w, STRIKE_ZONE.y + STRIKE_ZONE.h/3);
    ctx.moveTo(STRIKE_ZONE.x, STRIKE_ZONE.y + STRIKE_ZONE.h*2/3); ctx.lineTo(STRIKE_ZONE.x + STRIKE_ZONE.w, STRIKE_ZONE.y + STRIKE_ZONE.h*2/3);
    ctx.stroke();

    // ミートカーソル（攻撃時のみ）
    if(state.isTop) {
        ctx.strokeStyle = '#ffeb3b'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(cursor.x, cursor.y, cursor.radius, 0, Math.PI*2); ctx.stroke();
        ctx.fillStyle = 'rgba(255, 235, 59, 0.3)'; ctx.fill();
        ctx.fillStyle = '#ffeb3b'; ctx.beginPath(); ctx.arc(cursor.x, cursor.y, 3, 0, Math.PI*2); ctx.fill(); // 中心点
    }

    // スイングエフェクト
    if(swingAnim > 0) {
        ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
        ctx.beginPath();
        // 扇状のエフェクト
        ctx.arc(cursor.x, cursor.y, cursor.radius * 2, Math.PI, Math.PI*2);
        ctx.fill();
    }

    // ボール（奥から手前へサイズが変わる）
    if(ball.active) {
        let currentSize = BALL_MIN_SIZE + (BALL_MAX_SIZE - BALL_MIN_SIZE) * ball.progress;
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(ball.x, ball.y, currentSize, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#d32f2f'; ctx.lineWidth = 1; // 縫い目
        ctx.beginPath(); ctx.arc(ball.x, ball.y, currentSize, 0, Math.PI*2); ctx.stroke();
    }

    // ランナー表示（右上の小さなマップ）
    ctx.fillStyle = '#333'; ctx.fillRect(520, 20, 60, 60);
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(550, 70); ctx.lineTo(580, 40); ctx.lineTo(550, 10); ctx.lineTo(520, 40); ctx.closePath(); ctx.stroke();
    const bPos = [{x: 580, y: 40}, {x: 550, y: 10}, {x: 520, y: 40}]; // 1, 2, 3塁
    bPos.forEach((p, i) => {
        if(state.bases[i]) {
            ctx.fillStyle = '#f44336'; ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, Math.PI*2); ctx.fill();
        }
    });
}

function gameLoop() {
    update(); draw(); requestAnimationFrame(gameLoop);
}

// ==========================================
// 入力インターフェース (マウス & タッチ対応)
// ==========================================

// カーソルの座標をCanvas内の相対座標に変換
function getCanvasPos(e) {
    const rect = canvas.getBoundingClientRect();
    // scaleX/Yは、CSSによって縮小・拡大されている場合の補正
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    
    let clientX = e.touches ? e.touches[0].clientX : e.clientX;
    let clientY = e.touches ? e.touches[0].clientY : e.clientY;

    return {
        x: (clientX - rect.left) * scaleX,
        y: (clientY - rect.top) * scaleY
    };
}

// ドラッグ（タッチ）によるミートカーソル移動
function handleMove(e) {
    e.preventDefault(); // スクロール防止
    if(!state.isTop) return;
    let pos = getCanvasPos(e);
    // 画面外に出ないように制限
    cursor.x = Math.max(0, Math.min(canvas.width, pos.x));
    cursor.y = Math.max(0, Math.min(canvas.height, pos.y));
}

canvas.addEventListener('mousedown', (e) => {
    if(state.isTop) {
        cursor.isDragging = true;
        handleMove(e);
    } else {
        // 守備時はタップで投球
        let pos = getCanvasPos(e);
        throwPitch(pos.x, pos.y);
    }
});
canvas.addEventListener('mousemove', (e) => { if(cursor.isDragging) handleMove(e); });
canvas.addEventListener('mouseup', () => { cursor.isDragging = false; });
canvas.addEventListener('mouseleave', () => { cursor.isDragging = false; });

// タッチイベント（iPad/スマホ用）
canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if(state.isTop) handleMove(e);
    else {
        let pos = getCanvasPos(e);
        throwPitch(pos.x, pos.y);
    }
}, {passive: false});
canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if(state.isTop) handleMove(e);
}, {passive: false});

// スイングボタン
const swingBtn = document.getElementById('swing-btn');
swingBtn.addEventListener('mousedown', swing);
swingBtn.addEventListener('touchstart', (e) => { e.preventDefault(); swing(); }, {passive: false});

// キーボード（PCプレイ用）
window.addEventListener('keydown', (e) => { if(e.code === 'Space') swing(); });

gameLoop();

</script>
</body>
</html>
