<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Achex 3D FPS - Simple Edition</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: rgba(0,0,0,0.8); color: white; z-index: 10; }
        #lobby { text-align: center; background: #333; padding: 40px; border-radius: 10px; border: 2px solid #555; }
        input, select, button { display: block; width: 100%; margin: 10px 0; padding: 10px; font-size: 16px; border-radius: 5px; border: none; }
        button { background: #28a745; color: white; cursor: pointer; font-weight: bold; }
        button:hover { background: #218838; }
        #hud { position: absolute; bottom: 20px; left: 20px; color: white; text-shadow: 2px 2px 2px black; pointer-events: none; display: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 24px; pointer-events: none; display: none; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="lobby">
            <h1>FPS ARENA</h1>
            <input type="text" id="playerName" placeholder="名前を入力..." maxlength="10">
            <select id="weaponSelect">
                <option value="rifle">アサルトライフル (高速)</option>
                <option value="shotgun">ショットガン (重厚)</option>
            </select>
            <button id="btnJoin">出撃する</button>
            <p style="font-size: 12px; color: #aaa;">WASDで移動 / マウスで視点 / クリックで射撃</p>
        </div>
    </div>

    <div id="hud">
        <div id="statusText"></div>
    </div>
    <div id="crosshair">+</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- 設定項目 ---
        const HUB_NAME = "Achex_FPS_Sample_2024"; // 他のユーザーと被らないように変更推奨
        const WS_URL = "wss://achex.ca:4001";
        
        let scene, camera, renderer, socket;
        let myId = Math.random().toString(36).substring(7);
        let players = {}; // 他のプレイヤーのメッシュを格納
        let moveState = { forward: false, backward: false, left: false, right: false };
        let isGameStarted = false;
        let myData = { name: "", weapon: "", pos: {x:0, y:1.6, z:0}, rot: 0 };

        // --- 初期化 ---
        function initGame() {
            // シーン作成
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb); // 空色

            // カメラ
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            // レンダラー
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 照明
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(5, 10, 7).normalize();
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040));

            // 床
            const floor = new THREE.Mesh(
                new THREE.PlaneGeometry(100, 100),
                new THREE.MeshStandardMaterial({ color: 0x555555 })
            );
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // ループ
            animate();
        }

        // --- Achex 通信設定 ---
        function setupNetwork() {
            socket = new WebSocket(WS_URL);

            socket.onopen = () => {
                // AchexのHubに参加
                socket.send(JSON.stringify({ auth: "public", join: HUB_NAME }));
                console.log("Connected to Achex");
            };

            socket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (!data.msg || data.sID === myId) return;

                const remoteData = data.msg;
                const remoteId = data.sID;

                if (remoteData.type === "move") {
                    updateRemotePlayer(remoteId, remoteData);
                }
                if (remoteData.type === "leave") {
                    removePlayer(remoteId);
                }
            };
        }

        // --- プレイヤー管理 ---
        function updateRemotePlayer(id, data) {
            if (!players[id]) {
                // 新規プレイヤーの作成（武器の色を変える）
                const color = data.weapon === "rifle" ? 0xff0000 : 0x0000ff;
                const geo = new THREE.BoxGeometry(1, 2, 1);
                const mat = new THREE.MeshStandardMaterial({ color: color });
                const mesh = new THREE.Mesh(geo, mat);
                
                // 名札（簡易版）
                console.log(`${data.name} が参加しました`);
                
                scene.add(mesh);
                players[id] = mesh;
            }
            // 位置と回転の同期
            players[id].position.set(data.pos.x, 1, data.pos.z);
            players[id].rotation.y = data.rot;
        }

        function removePlayer(id) {
            if (players[id]) {
                scene.remove(players[id]);
                delete players[id];
            }
        }

        // --- 入力制御 ---
        document.getElementById('btnJoin').onclick = () => {
            myData.name = document.getElementById('playerName').value || "NoName";
            myData.weapon = document.getElementById('weaponSelect').value;
            
            document.getElementById('ui-layer').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            document.getElementById('crosshair').style.display = 'block';
            document.getElementById('statusText').innerText = `Player: ${myData.name} | Weapon: ${myData.weapon}`;
            
            // マウス固定を要求
            document.body.requestPointerLock();
            isGameStarted = true;
            initGame();
            setupNetwork();
        };

        window.addEventListener('keydown', (e) => {
            if (e.code === 'KeyW') moveState.forward = true;
            if (e.code === 'KeyS') moveState.backward = true;
            if (e.code === 'KeyA') moveState.left = true;
            if (e.code === 'KeyD') moveState.right = true;
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'KeyW') moveState.forward = false;
            if (e.code === 'KeyS') moveState.backward = false;
            if (e.code === 'KeyA') moveState.left = false;
            if (e.code === 'KeyD') moveState.right = false;
        });

        window.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement) {
                camera.rotation.y -= e.movementX * 0.002;
                myData.rot = camera.rotation.y;
            }
        });

        // --- メインループ ---
        function animate() {
            requestAnimationFrame(animate);

            if (isGameStarted) {
                const speed = 0.1;
                if (moveState.forward) {
                    camera.position.x -= Math.sin(camera.rotation.y) * speed;
                    camera.position.z -= Math.cos(camera.rotation.y) * speed;
                }
                if (moveState.backward) {
                    camera.position.x += Math.sin(camera.rotation.y) * speed;
                    camera.position.z += Math.cos(camera.rotation.y) * speed;
                }
                if (moveState.left) {
                    camera.position.x -= Math.cos(camera.rotation.y) * speed;
                    camera.position.z += Math.sin(camera.rotation.y) * speed;
                }
                if (moveState.right) {
                    camera.position.x += Math.cos(camera.rotation.y) * speed;
                    camera.position.z -= Math.sin(camera.rotation.y) * speed;
                }

                // サーバーへ自分のデータを送信
                if (socket && socket.readyState === WebSocket.OPEN) {
                    socket.send(JSON.stringify({
                        to: HUB_NAME,
                        sID: myId,
                        msg: {
                            type: "move",
                            name: myData.name,
                            weapon: myData.weapon,
                            pos: { x: camera.position.x, z: camera.position.z },
                            rot: camera.rotation.y
                        }
                    }));
                }
            }

            if (renderer) renderer.render(scene, camera);
        }

        // ウィンドウリサイズ対応
        window.addEventListener('resize', () => {
            if (camera) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>
</html>
