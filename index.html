<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Achex 3D FPS - Pro Edition</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #000; }
        
        /* ロビー画面 */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: rgba(0,0,0,0.85); color: white; z-index: 20; }
        #lobby { text-align: center; background: #222; padding: 40px; border-radius: 15px; border: 2px solid #444; box-shadow: 0 0 20px rgba(0,255,0,0.2); width: 300px; }
        input, select, button { display: block; width: 100%; margin: 15px 0; padding: 12px; font-size: 16px; border-radius: 8px; border: 1px solid #444; background: #333; color: white; box-sizing: border-box; }
        button { background: #28a745; cursor: pointer; font-weight: bold; border: none; transition: 0.3s; }
        button:hover { background: #218838; transform: scale(1.05); }

        /* ゲーム内UI */
        #playerCount { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.6); color: #0f0; padding: 10px 20px; border-radius: 5px; font-weight: bold; font-size: 18px; border-left: 4px solid #0f0; display: none; z-index: 10; }
        #hud { position: absolute; bottom: 20px; left: 20px; color: white; text-shadow: 2px 2px 4px black; pointer-events: none; display: none; z-index: 10; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: rgba(255,255,255,0.8); font-size: 24px; pointer-events: none; display: none; z-index: 10; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="lobby">
            <h1 style="color: #28a745; margin-top: 0;">FPS ARENA</h1>
            <input type="text" id="playerName" placeholder="プレイヤー名" maxlength="12">
            <select id="weaponSelect">
                <option value="rifle">アサルトライフル (Red)</option>
                <option value="shotgun">ショットガン (Blue)</option>
            </select>
            <button id="btnJoin">出撃する</button>
            <div style="font-size: 12px; color: #888; line-height: 1.5;">
                WASD: 移動<br>Mouse: 視点操作<br>Esc: メニュー
            </div>
        </div>
    </div>

    <div id="playerCount">参加者: 1</div>
    <div id="hud">
        <div id="statusText"></div>
    </div>
    <div id="crosshair">＋</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- 基本設定 ---
        const HUB_NAME = "Achex_FullFPS_Stage_01"; 
        const WS_URL = "wss://achex.ca:4001";
        
        let scene, camera, renderer, socket;
        let myId = Math.random().toString(36).substring(7);
        let players = {}; 
        let moveState = { forward: false, backward: false, left: false, right: false };
        let isGameStarted = false;
        let myData = { name: "", weapon: "", pos: {x:0, z:10}, rot: 0 };

        // --- ステージ構築 ---
        function createStage() {
            // 床（グリッド模様）
            const floorGeo = new THREE.PlaneGeometry(100, 100);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            const grid = new THREE.GridHelper(100, 50, 0x444444, 0x222222);
            scene.add(grid);

            // 外壁
            const wallMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
            const createWall = (w, h, d, x, y, z) => {
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), wallMat);
                mesh.position.set(x, y, z);
                scene.add(mesh);
            };
            createWall(100, 10, 1, 0, 5, -50); // 奥
            createWall(100, 10, 1, 0, 5, 50);  // 手前
            createWall(1, 10, 100, -50, 5, 0); // 左
            createWall(1, 10, 100, 50, 5, 0);  // 右

            // 障害物（柱やボックス）
            for(let i=0; i<15; i++) {
                const size = 2 + Math.random() * 4;
                const box = new THREE.Mesh(
                    new THREE.BoxGeometry(size, size * 2, size),
                    new THREE.MeshStandardMaterial({ color: 0x444444 })
                );
                box.position.set(
                    (Math.random() - 0.5) * 80,
                    size,
                    (Math.random() - 0.5) * 80
                );
                scene.add(box);
            }
        }

        function initGame() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            scene.fog = new THREE.FogExp2(0x050505, 0.02); // 霧で奥行き感を出す

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.y = 1.6;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // ライティング
            const sun = new THREE.DirectionalLight(0xffffff, 1.5);
            sun.position.set(10, 20, 10);
            scene.add(sun);
            scene.add(new THREE.AmbientLight(0x404040, 0.5));

            createStage();
            animate();
        }

        // --- ネットワーク & 参加者数更新 ---
        function updatePlayerCountDisplay() {
            const total = Object.keys(players).length + 1; // 自分 + 他人
            document.getElementById('playerCount').innerText = `参加者: ${total}`;
        }

        function setupNetwork() {
            socket = new WebSocket(WS_URL);
            socket.onopen = () => {
                socket.send(JSON.stringify({ auth: "public", join: HUB_NAME }));
            };

            socket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (!data.msg || data.sID === myId) return;

                if (data.msg.type === "move") {
                    updateRemotePlayer(data.sID, data.msg);
                }
            };

            // 簡易的なタイムアウト（5秒通信がないプレイヤーを削除）
            setInterval(() => {
                const now = Date.now();
                for (let id in players) {
                    if (now - players[id].lastUpdate > 5000) {
                        scene.remove(players[id].mesh);
                        delete players[id];
                        updatePlayerCountDisplay();
                    }
                }
            }, 2000);
        }

        function updateRemotePlayer(id, data) {
            if (!players[id]) {
                const color = data.weapon === "rifle" ? 0xff4444 : 0x4444ff;
                // 体
                const group = new THREE.Group();
                const body = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 0.5), new THREE.MeshStandardMaterial({ color }));
                group.add(body);
                // 武器のモデル代わり
                const gun = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 1), new THREE.MeshStandardMaterial({ color: 0x111111 }));
                gun.position.set(0.4, 0.2, -0.5);
                group.add(gun);

                scene.add(group);
                players[id] = { mesh: group, lastUpdate: Date.now() };
                updatePlayerCountDisplay();
            }
            players[id].mesh.position.set(data.pos.x, 1, data.pos.z);
            players[id].mesh.rotation.y = data.rot;
            players[id].lastUpdate = Date.now();
        }

        // --- コントロール ---
        document.getElementById('btnJoin').onclick = () => {
            myData.name = document.getElementById('playerName').value || "Soldier";
            myData.weapon = document.getElementById('weaponSelect').value;
            
            document.getElementById('ui-layer').style.display = 'none';
            document.getElementById('playerCount').style.display = 'block';
            document.getElementById('hud').style.display = 'block';
            document.getElementById('crosshair').style.display = 'block';
            document.getElementById('statusText').innerText = `NAME: ${myData.name} | WEAPON: ${myData.weapon.toUpperCase()}`;
            
            document.body.requestPointerLock();
            isGameStarted = true;
            initGame();
            setupNetwork();
            updatePlayerCountDisplay();
        };

        // WASD入力
        window.addEventListener('keydown', (e) => { if(moveState.hasOwnProperty(e.code.replace('Key','').toLowerCase())) moveState[e.code.replace('Key','').toLowerCase()] = true; });
        window.addEventListener('keyup', (e) => { if(moveState.hasOwnProperty(e.code.replace('Key','').toLowerCase())) moveState[e.code.replace('Key','').toLowerCase()] = false; });
        
        window.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement) {
                camera.rotation.y -= e.movementX * 0.002;
                // 上下制限（FPSおなじみの処理）
                camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x - e.movementY * 0.002));
                myData.rot = camera.rotation.y;
            }
        });

        function animate() {
            requestAnimationFrame(animate);
            if (!isGameStarted) return;

            const speed = 0.12;
            if (moveState.forward) { camera.position.x -= Math.sin(camera.rotation.y) * speed; camera.position.z -= Math.cos(camera.rotation.y) * speed; }
            if (moveState.backward) { camera.position.x += Math.sin(camera.rotation.y) * speed; camera.position.z += Math.cos(camera.rotation.y) * speed; }
            if (moveState.left) { camera.position.x -= Math.cos(camera.rotation.y) * speed; camera.position.z += Math.sin(camera.rotation.y) * speed; }
            if (moveState.right) { camera.position.x += Math.cos(camera.rotation.y) * speed; camera.position.z -= Math.sin(camera.rotation.y) * speed; }

            // 境界チェック（壁の外に出ないように）
            camera.position.x = Math.max(-48, Math.min(48, camera.position.x));
            camera.position.z = Math.max(-48, Math.min(48, camera.position.z));

            if (socket && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({
                    to: HUB_NAME, sID: myId,
                    msg: { type: "move", name: myData.name, weapon: myData.weapon, pos: { x: camera.position.x, z: camera.position.z }, rot: camera.rotation.y }
                }));
            }
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            if (camera) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>
</html>
